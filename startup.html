<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting Butterfly Effect&hellip;</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 440px;
      padding: 40px 28px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Butterfly ── */
    .butterfly-wrap {
      margin-bottom: 32px;
      position: relative;
      display: inline-block;
    }

    .butterfly-wrap svg {
      width: 96px;
      height: 96px;
      animation: float 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(10, 132, 255, 0.45))
              drop-shadow(0 0 6px rgba(48, 209, 88, 0.3));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0)   rotate(-1.5deg) scale(1);    }
      50%       { transform: translateY(-12px) rotate(1.5deg) scale(1.04); }
    }

    /* ── Title ── */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #f5f5f7;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #48484a;
      margin-bottom: 40px;
      letter-spacing: 0.03em;
    }

    /* ── Step badge ── */
    .step-badge {
      font-size: 0.72rem;
      color: #48484a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 10px;
      min-height: 1em;
    }

    /* ── Stage label ── */
    .stage {
      font-size: 1rem;
      color: #aeaeb2;
      min-height: 1.5em;
      margin-bottom: 6px;
      transition: opacity 0.35s ease;
    }

    /* ── Detail sub-message ── */
    .detail {
      font-size: 0.82rem;
      color: #636366;
      margin-bottom: 20px;
      min-height: 1.2em;
      transition: opacity 0.3s ease;
    }

    /* ── Progress bar ── */
    .progress-track {
      width: 100%;
      height: 3px;
      background: #1c1c1e;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* Indeterminate (default): shimmy animation */
    .progress-fill {
      height: 100%;
      width: 38%;
      background: linear-gradient(90deg, #0a84ff 0%, #30d158 100%);
      border-radius: 2px;
      animation: shimmy 1.7s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    /* Live mode: real percentage, smooth grow */
    .progress-fill.live {
      animation: none;
      width: 3%;
      transition: width 0.6s ease;
    }

    @keyframes shimmy {
      0%   { transform: translateX(-140%); }
      100% { transform: translateX(370%);  }
    }

    /* ── First-run reassurance note ── */
    .first-run-note {
      display: none;
      font-size: 0.78rem;
      color: #8e8e93;
      margin-top: 4px;
      padding: 10px 14px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      line-height: 1.55;
      text-align: left;
    }

    /* ── Subtle background sparkles ── */
    .sparks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d) ease-in-out var(--delay) infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 0.6; transform: scale(1); }
    }

    /* ── Error card ── */
    .error-card {
      display: none;
      text-align: left;
      background: #161b22;
      border: 1px solid #30363d;
      border-left: 3px solid #ff453a;
      border-radius: 10px;
      padding: 20px 24px;
      margin-top: 8px;
    }
    .error-card.visible { display: block; }
    .error-title {
      font-size: 1rem;
      font-weight: 600;
      color: #ff453a;
      margin-bottom: 12px;
    }
    .error-body { font-size: 0.85rem; color: #aeaeb2; line-height: 1.6; }
    .error-body p { margin-bottom: 10px; }
    .cmd {
      display: block;
      font-family: "SF Mono", "Menlo", "Courier New", monospace;
      font-size: 0.82rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px;
      color: #30d158;
      margin: 6px 0 10px;
      white-space: pre;
      overflow-x: auto;
    }
    .error-note {
      font-size: 0.75rem;
      color: #48484a;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #21262d;
    }
    body.has-error .progress-fill { animation: none; background: #30363d; }
    body.has-error .butterfly-wrap svg { filter: none; opacity: 0.35; }
    body.has-error .stage { color: #636366; }
    body.has-error { overflow-y: auto; align-items: flex-start; }
    body.has-error .container { padding-top: 40px; padding-bottom: 40px; }
  </style>
</head>
<body>

  <!-- Background sparkles -->
  <div class="sparks" id="sparks"></div>

  <div class="container">
    <div class="butterfly-wrap">
      <!-- Butterfly SVG — new vector design, 96×96 display -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="96" height="96" aria-hidden="true">
        <defs>
          <linearGradient id="st-ul" x1="50" y1="54" x2="5"  y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#1a6fff"/>
            <stop offset="100%" stop-color="#5ee7d4"/>
          </linearGradient>
          <linearGradient id="st-ur" x1="50" y1="54" x2="95" y2="24" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#1a6fff"/>
            <stop offset="100%" stop-color="#30d158"/>
          </linearGradient>
          <linearGradient id="st-ll" x1="50" y1="60" x2="22" y2="88" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#005ec0"/>
            <stop offset="100%" stop-color="#34c759"/>
          </linearGradient>
          <linearGradient id="st-lr" x1="50" y1="60" x2="78" y2="88" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#005ec0"/>
            <stop offset="100%" stop-color="#5ee7d4"/>
          </linearGradient>
        </defs>
        <path d="M 50,48 C 40,25 12,12 5,26 C 1,40 14,56 50,60 Z"   fill="url(#st-ul)"/>
        <path d="M 50,48 C 60,25 88,12 95,26 C 99,40 86,56 50,60 Z"  fill="url(#st-ur)"/>
        <path d="M 50,60 C 38,64 20,72 22,84 C 24,94 40,92 50,66 Z"  fill="url(#st-ll)"/>
        <path d="M 50,60 C 62,64 80,72 78,84 C 76,94 60,92 50,66 Z"  fill="url(#st-lr)"/>
        <ellipse cx="50" cy="54" rx="3" ry="22" fill="#0d1229"/>
        <path d="M 49,32 Q 38,17 33,9" stroke="#0d1229" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="33" cy="9" r="1.8" fill="#1a6fff"/>
        <path d="M 51,32 Q 62,17 67,9" stroke="#0d1229" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <circle cx="67" cy="9" r="1.8" fill="#30d158"/>
        <path d="M 7,28 C 3,23 5,16 10,19 C 15,22 13,29 8,27"
              fill="none" stroke="#5ee7d4" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
        <path d="M 93,28 C 97,23 95,16 90,19 C 85,22 87,29 92,27"
              fill="none" stroke="#30d158" stroke-width="1" opacity="0.6" stroke-linecap="round"/>
        <path d="M 49,59 C 32,46 16,32 8,26"
              fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1" stroke-linecap="round"/>
        <path d="M 51,59 C 68,46 84,32 92,26"
              fill="none" stroke="rgba(255,255,255,0.13)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Butterfly Effect</h1>
    <p class="subtitle">Balance Forecast dashboard &middot; for Monarch users</p>

    <div class="step-badge" id="stepBadge"></div>
    <div class="stage" id="stage">🦋 Waking up Butterfly Effect&hellip;</div>
    <div class="detail" id="detail"></div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="first-run-note" id="firstRunNote">
      🌐 <strong>First-run setup:</strong> Downloading the Chromium browser (~150 MB).
      This only happens once &mdash; future launches will be instant. Please be patient.
    </div>

    <div class="error-card" id="errorCard">
      <div class="error-title" id="errorTitle"></div>
      <div class="error-body" id="errorBody"></div>
      <div class="error-note">After installing, close this window and run the app again.</div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';

    // ── Error content by code ────────────────────────────────────────────────
    var ERROR_CONTENT = {
      nopython: {
        title: '\u26a0\ufe0f Python 3.11 or higher is required',
        body: function (os) {
          if (os === 'darwin') return ''
            + '<p>Butterfly Effect needs Python 3.11+. The quickest way to install it:</p>'
            + '<p><strong>Option 1 \u2014 Homebrew</strong> <span style="color:#636366">(recommended)</span></p>'
            + '<code class="cmd">/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"</code>'
            + '<p style="margin-top:-4px">Then:</p>'
            + '<code class="cmd">brew install python@3.12</code>'
            + '<p><strong>Option 2 \u2014 Direct download</strong></p>'
            + '<p>Visit <a href="https://python.org/downloads" style="color:#0a84ff">python.org/downloads</a> and install Python 3.12 or newer.</p>';
          return ''
            + '<p>Butterfly Effect needs Python 3.11+.</p>'
            + '<p><strong>Ubuntu / Debian:</strong></p>'
            + '<code class="cmd">sudo apt update &amp;&amp; sudo apt install python3.12</code>'
            + '<p><strong>Fedora / RHEL:</strong></p>'
            + '<code class="cmd">sudo dnf install python3.12</code>'
            + '<p><strong>Arch:</strong></p>'
            + '<code class="cmd">sudo pacman -S python</code>';
        }
      },
      novenv: {
        title: '\u26a0\ufe0f Python venv module is missing',
        body: function (os) {
          return ''
            + '<p>Python is installed but the <code>venv</code> module is missing. On Ubuntu, Debian, and Linux Mint it is a separate package:</p>'
            + '<code class="cmd">sudo apt install python3-venv</code>'
            + '<p>Then close this window and run <code>./run.sh</code> again.</p>';
        }
      },
      pipfail: {
        title: '\u26a0\ufe0f Dependency installation failed',
        body: function (os) {
          return ''
            + '<p>pip could not install the required packages. This usually means a corrupted Python environment.</p>'
            + '<p><strong>Try resetting the virtual environment:</strong></p>'
            + '<code class="cmd">rm -rf ~/.cache/butterfly-effect-venv\n./run.sh</code>'
            + '<p>If the problem persists, check your internet connection and try again.</p>';
        }
      }
    };

    // ── Show error card ──────────────────────────────────────────────────────
    var _tickInterval = null;
    function showError(errCode, os) {
      var def = ERROR_CONTENT[errCode];
      document.getElementById('errorTitle').innerHTML = def.title;
      document.getElementById('errorBody').innerHTML  = def.body(os);
      document.getElementById('errorCard').classList.add('visible');
      document.body.classList.add('has-error');
      document.title = 'Butterfly Effect \u2014 Setup needed';
      if (_tickInterval) { clearInterval(_tickInterval); _tickInterval = null; }
    }

    function checkHash() {
      var raw = (typeof window.__BF_PARAMS !== 'undefined' ? window.__BF_PARAMS : '')
                || location.hash.slice(1);
      var params  = new URLSearchParams(raw);
      var errCode = params.get('e');
      var os      = params.get('os') || 'darwin';
      if (errCode && ERROR_CONTENT[errCode]) { showError(errCode, os); return true; }
      return false;
    }

    window.addEventListener('hashchange', checkHash);

    if (checkHash()) {
      // Error on load — no timers needed

    } else {

    // ── DOM refs ─────────────────────────────────────────────────────────────
    var stageEl      = document.getElementById('stage');
    var detailEl     = document.getElementById('detail');
    var stepBadgeEl  = document.getElementById('stepBadge');
    var firstRunEl   = document.getElementById('firstRunNote');
    var progressFill = document.getElementById('progressFill');

    // ── Real-time status mode (driven by JSONP status server on port 5003) ───
    var _liveMode = false;

    var STAGE_LABELS = {
      venv:            '\ud83d\udc0d Setting up Python environment\u2026',
      pip:             '\ud83d\udce6 Installing Python dependencies\u2026',
      playwright:      '\ud83c\udf10 Downloading Chromium browser\u2026',
      playwright_done: '\u2705 Browser download complete\u2026',
      starting:        '\ud83d\ude80 Starting the server\u2026',
    };

    function _setStage(label) {
      if (stageEl.textContent === label) return;
      stageEl.style.opacity = '0';
      setTimeout(function () { stageEl.textContent = label; stageEl.style.opacity = '1'; }, 175);
    }

    function applyStatus(s) {
      if (!s) return;
      if (!_liveMode) {
        _liveMode = true;
        clearInterval(_tickInterval); _tickInterval = null;
        progressFill.classList.add('live');
      }
      var label = STAGE_LABELS[s.stage] || ('\ud83e\udd8b ' + (s.detail || 'Starting up\u2026'));
      _setStage(label);
      if (s.detail) detailEl.textContent = s.detail;
      if (s.pct >= 0) progressFill.style.width = Math.max(3, s.pct) + '%';
      if (s.step > 0 && s.total > 0)
        stepBadgeEl.textContent = 'Step ' + s.step + ' of ' + s.total;
      firstRunEl.style.display = (s.stage === 'playwright' || s.stage === 'playwright_done') ? 'block' : 'none';
    }

    // ── JSONP polling — <script> tags bypass file:// CORS restrictions ───────
    function pollStatus() {
      var s = document.createElement('script');
      s.src = 'http://127.0.0.1:5003/?' + Date.now();
      s.onload  = function () {
        s.remove();
        if (window.__BF_STATUS) applyStatus(window.__BF_STATUS);
        setTimeout(pollStatus, 500);
      };
      s.onerror = function () { s.remove(); setTimeout(pollStatus, 1500); };
      document.head.appendChild(s);
    }

    // ── Fallback: time-based stage messages (if status server never responds) ─
    var stages = [
      [0,  '\ud83e\udd8b Waking up Butterfly Effect\u2026'],
      [3,  '\ud83d\udc0d Warming up the Python environment\u2026'],
      [9,  '\ud83d\udce6 Installing dependencies\u2026'],
      [22, '\ud83d\ude80 Starting the forecast engine\u2026'],
      [42, '\u231b Almost there\u2026'],
    ];
    var quips = [
      'Reticulating splines\u2026',
      'Calibrating butterfly wings for maximum flappiness\u2026',
      'Calculating the butterfly effect on your bank account\u2026',
      'Teaching butterflies to read spreadsheets\u2026',
      'Untangling financial spaghetti\u2026',
      'Negotiating with pip\u2026 it has demands',
      'Establishing quantum entanglement with Monarch Money\u2026',
      'Defragmenting your financial anxiety\u2026',
    ];
    var start = Date.now(), quipIdx = 0, showQuip = false;

    function getStageLabel() {
      var elapsed = (Date.now() - start) / 1000, label = stages[0][1];
      for (var i = 0; i < stages.length; i++) if (elapsed >= stages[i][0]) label = stages[i][1];
      return label;
    }

    function tick() {
      if (_liveMode) return;
      var next = showQuip ? getStageLabel() : quips[(++quipIdx) % quips.length];
      showQuip = !showQuip;
      stageEl.style.opacity = '0';
      setTimeout(function () { stageEl.textContent = next; stageEl.style.opacity = '1'; }, 175);
    }

    // ── Poll Flask via Image() — bypasses file:// CORS restrictions ──────────
    function checkReady() {
      var img = new Image();
      img.onload  = function () { window.location.href = 'http://localhost:5002/'; };
      img.onerror = function () { setTimeout(checkReady, 1000); };
      img.src = 'http://localhost:5002/_ping?' + Date.now();
    }

    // ── Scatter a few tiny sparkles in the background ────────────────────────
    function makeSparks() {
      var container = document.getElementById('sparks');
      var colors = ['#0a84ff', '#30d158', '#ff9f0a', '#bf5af2', '#ff375f'];
      for (var i = 0; i < 22; i++) {
        var el = document.createElement('div');
        el.className = 'spark';
        var size = Math.random() * 4 + 2;
        el.style.cssText = [
          'width:' + size + 'px',
          'height:' + size + 'px',
          'left:' + (Math.random() * 100) + '%',
          'top:' + (Math.random() * 100) + '%',
          'background:' + colors[Math.floor(Math.random() * colors.length)],
          '--d:' + (Math.random() * 3 + 2) + 's',
          '--delay:' + (Math.random() * 4) + 's',
        ].join(';');
        container.appendChild(el);
      }
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    stageEl.textContent = getStageLabel();
    makeSparks();
    _tickInterval = setInterval(tick, 3200);
    setTimeout(pollStatus, 300);   // start JSONP status polling immediately
    setTimeout(checkReady, 1000);  // keep /_ping polling for server-ready redirect

    } // end else (no error)
  })();
  </script>
</body>
</html>
