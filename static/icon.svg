<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!--
    Butterfly Effect app icon (with dark background — for .icns generation)
    macOS clips to rounded square automatically; background fills the full tile.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%"   stop-color="#18203a"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="i-ul" x1="50" y1="54" x2="5"  y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a6fff"/>
      <stop offset="100%" stop-color="#5ee7d4"/>
    </linearGradient>
    <linearGradient id="i-ur" x1="50" y1="54" x2="95" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a6fff"/>
      <stop offset="100%" stop-color="#30d158"/>
    </linearGradient>
    <linearGradient id="i-ll" x1="50" y1="60" x2="22" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#005ec0"/>
      <stop offset="100%" stop-color="#34c759"/>
    </linearGradient>
    <linearGradient id="i-lr" x1="50" y1="60" x2="78" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#005ec0"/>
      <stop offset="100%" stop-color="#5ee7d4"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="100" height="100" fill="url(#bg)"/>

  <!-- wings -->
  <path d="M 50,48 C 40,25 12,12 5,26 C 1,40 14,56 50,60 Z"   fill="url(#i-ul)"/>
  <path d="M 50,48 C 60,25 88,12 95,26 C 99,40 86,56 50,60 Z"  fill="url(#i-ur)"/>
  <path d="M 50,60 C 38,64 20,72 22,84 C 24,94 40,92 50,66 Z"  fill="url(#i-ll)"/>
  <path d="M 50,60 C 62,64 80,72 78,84 C 76,94 60,92 50,66 Z"  fill="url(#i-lr)"/>

  <!-- body -->
  <ellipse cx="50" cy="54" rx="3" ry="22" fill="#0d1229"/>

  <!-- antennae -->
  <path d="M 49,32 Q 38,17 33,9" stroke="#0d1229" stroke-width="1.5"
        fill="none" stroke-linecap="round"/>
  <circle cx="33" cy="9" r="1.8" fill="#1a6fff"/>
  <path d="M 51,32 Q 62,17 67,9" stroke="#0d1229" stroke-width="1.5"
        fill="none" stroke-linecap="round"/>
  <circle cx="67" cy="9" r="1.8" fill="#30d158"/>

  <!-- chaos vortex marks -->
  <path d="M 7,28 C 3,23 5,16 10,19 C 15,22 13,29 8,27"
        fill="none" stroke="#5ee7d4" stroke-width="1"
        opacity="0.6" stroke-linecap="round"/>
  <path d="M 93,28 C 97,23 95,16 90,19 C 85,22 87,29 92,27"
        fill="none" stroke="#30d158" stroke-width="1"
        opacity="0.6" stroke-linecap="round"/>

  <!-- wing veins -->
  <path d="M 49,59 C 32,46 16,32 8,26"
        fill="none" stroke="rgba(255,255,255,0.13)"
        stroke-width="1" stroke-linecap="round"/>
  <path d="M 51,59 C 68,46 84,32 92,26"
        fill="none" stroke="rgba(255,255,255,0.13)"
        stroke-width="1" stroke-linecap="round"/>
</svg>
